plugins {
    id 'java'
    id 'fabric-loom' version '1.7'  // Your existing Fabric Loom plugin
}

java {
    sourceCompatibility = JavaVersion.VERSION_17  // or VERSION_17 if targeting newer Minecraft versions
    targetCompatibility = JavaVersion.VERSION_17  // or VERSION_17
    toolchain {
        languageVersion = JavaLanguageVersion.of(17) // Use 17 or 21 as needed
    }
}

// archivesBaseName = project.archives_base_name
// temporary fix
version = project.mod_version
group = project.maven_group

repositories {
    maven {
        name = "Meteor Dev Releases"
        url = "https://maven.meteordev.org/releases"
    }
    maven {
        name = "Meteor Dev Snapshots"
        url = "https://maven.meteordev.org/snapshots"
    }
}

dependencies {
    // Fabric
    minecraft "com.mojang:minecraft:${project.minecraft_version}"
    mappings "net.fabricmc:yarn:${project.yarn_mappings}:v2"
    modImplementation "net.fabricmc:fabric-loader:${project.loader_version}"

    // Meteor
    modImplementation "meteordevelopment:meteor-client:${project.meteor_version}"

    // Meteor Jar
    //modImplementation files('../meteor-client/build/libs/meteor-client-0.5.9.jar')
}

processResources {
    def propertyMap = [
        "version": project.version,
        "mc_version": project.minecraft_version,
        "commit": project.findProperty("commit") ?: ""
    ]

    inputs.properties(propertyMap)
    filesMatching("fabric.mod.json") {
        expand(propertyMap)
    }
}

tasks.withType(JavaCompile).configureEach {
    it.options.encoding("UTF-8")
}
